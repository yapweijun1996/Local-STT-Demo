<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0f1115" />
<title>Offline — Local STT</title>
<style>
  html, body { height: 100%; margin: 0; }
  body {
    display: grid; place-items: center; text-align: center;
    font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f1115; color: #e6e9ef;
    padding: max(24px, env(safe-area-inset-top)) 24px;
  }
  .card { max-width: 360px; }
  .icon { width: 72px; height: 72px; margin: 0 auto 16px; display: block; }
  h1 { font-size: 20px; margin: 0 0 8px; }
  p { color: #9aa4b2; margin: 0 0 20px; }
  button {
    font: inherit; font-weight: 600; cursor: pointer;
    background: #5b9cff; color: #04121f; border: 0; border-radius: 10px; padding: 10px 18px;
  }
</style>
</head>
<body>
  <div class="card">
    <img class="icon" src="./icons/icon.svg" alt="" />
    <h1>You're offline</h1>
    <p>This page isn't cached yet. The browser STT demo also needs to download its model online the first time. Reconnect and try again.</p>
    <button onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
