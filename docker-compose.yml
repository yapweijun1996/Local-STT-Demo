# Local STT — Docker mode (Python backend + faster-whisper + ffmpeg + web UI).
#   docker compose up --build      → http://localhost:6601/
# Models download into the named volume on first start (HF_HOME), then persist.
services:
  stt:
    build: ./backend
    image: local-stt-backend
    ports:
      - "6601:6601"
    environment:
      # faster-whisper model: tiny | base | small | medium | large-v3 | large-v3-turbo
      WHISPER_MODEL: "large-v3-turbo"
      # Model cache dir (mounted volume). Keeps downloaded models across restarts.
      HF_HOME: /app/backend/vendor/models
    volumes:
      - stt-models:/app/backend/vendor/models
    restart: unless-stopped

volumes:
  stt-models:
